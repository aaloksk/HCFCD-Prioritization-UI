server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hydrodecisions.com;

    ssl_certificate /etc/letsencrypt/live/hydrodecisions.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hydrodecisions.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.hydrodecisions.com/Precinct1Project/;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.hydrodecisions.com;

    ssl_certificate /etc/letsencrypt/live/hydrodecisions.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hydrodecisions.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100M;

    location = / {
        return 301 https://www.hydrodecisions.com/Precinct1Project/;
    }

    location = /Precinct1Project {
        return 301 https://www.hydrodecisions.com/Precinct1Project/;
    }

    location /Precinct1Project/ {
        proxy_pass http://127.0.0.1:8501/Precinct1Project/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
